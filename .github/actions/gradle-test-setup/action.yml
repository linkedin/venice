name: 'Gradle Test Setup'
description: 'Common setup for Gradle-based CI workflows: JDK, upstream remote, Gradle, and disk cleanup'
inputs:
  java-version:
    description: 'JDK version to use'
    required: false
    default: '17'

runs:
  using: 'composite'
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: ${{ inputs.java-version }}
        distribution: 'temurin'
        cache: 'gradle'
    - shell: bash
      run: |
        git remote set-head origin --auto
        if git remote get-url upstream >/dev/null 2>&1; then
          git remote set-url upstream https://github.com/linkedin/venice
        else
          git remote add upstream https://github.com/linkedin/venice
        fi
        git fetch upstream
    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        add-job-summary: never
    - name: Bootstrap Gradle wrapper with retry
      # On a wrapper cache miss the distribution is fetched from services.gradle.org,
      # which intermittently times out and kills the shard before any test runs
      # (e.g. run 27256713265). Warm it up with retries so a transient timeout
      # costs seconds instead of the whole job.
      shell: bash
      run: |
        for attempt in 1 2 3; do
          if ./gradlew --version; then
            exit 0
          fi
          echo "Gradle wrapper bootstrap failed (attempt ${attempt}/3); retrying in $((attempt * 20))s..."
          sleep $((attempt * 20))
        done
        echo "Gradle wrapper bootstrap failed after 3 attempts"
        exit 1
    - name: Free up disk space in the background
      shell: bash
      run: |
        bash scripts/ci/util_free_space.sh > background_cleanup.log 2>&1 &
