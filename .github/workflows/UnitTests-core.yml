on:
  workflow_call:
    inputs:
      arg:
        required: true
        type: string
      artifact_suffix:
        required: true
        type: string


jobs:
  reusable_job:
    name: "UT & CodeCov"
    strategy:
      fail-fast: false
      matrix:
        jdk: [ 8, 11, 17 ]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
      id-token: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.jdk }}
          distribution: 'temurin'
          cache: 'gradle'
      - shell: bash
        run: |
          git remote set-head origin --auto
          git remote add upstream https://github.com/linkedin/venice
          git fetch upstream
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: never
      - name: Free up disk space in the background
        run: |
          bash scripts/ci/util_free_space.sh > background_cleanup.log 2>&1 &
      - name: Run Unit Tests with Code Coverage
        run: ./gradlew  -x :internal:venice-avro-compatibility-test:test  ${{ inputs.arg }}

      - name: Print Failed Test Logs
        if: failure()
        shell: bash
        run: |
          python3 - <<'PY'
          import glob
          import xml.etree.ElementTree as ET

          failed_cases = 0
          for xml_path in sorted(glob.glob("**/build/test-results/**/*.xml", recursive=True)):
              try:
                  root = ET.parse(xml_path).getroot()
              except Exception as parse_error:
                  print(f"Skipping unparsable report {xml_path}: {parse_error}")
                  continue

              for testcase in root.iter("testcase"):
                  failures = list(testcase.findall("failure")) + list(testcase.findall("error"))
                  if not failures:
                      continue

                  failed_cases += 1
                  class_name = testcase.attrib.get("classname", "UnknownClass")
                  test_name = testcase.attrib.get("name", "unknownTest")
                  print(f"::group::{class_name}.{test_name} ({xml_path})")
                  for failure in failures:
                      failure_type = failure.attrib.get("type", failure.tag)
                      failure_message = failure.attrib.get("message")
                      if failure_message:
                          print(f"{failure_type}: {failure_message}")
                      failure_text = (failure.text or "").strip()
                      if failure_text:
                          print(failure_text)
                  print("::endgroup::")

          if failed_cases == 0:
              print("No failed test cases were found in JUnit XML reports.")
          else:
              print(f"Printed logs for {failed_cases} failed test case(s).")
          PY
      - name: Package Build Artifacts
        if: success() || failure()
        shell: bash
        run: |
          mkdir ${{ inputs.artifact_suffix }}-artifacts
          find . -path "**/build/reports/*" -or -path "**/build/test-results/*" > artifacts.list
          rsync -R --files-from=artifacts.list . ${{ inputs.artifact_suffix }}-artifacts
          tar -zcvf ${{ inputs.artifact_suffix }}-jdk${{ matrix.jdk }}-logs.tar.gz ${{ inputs.artifact_suffix }}-artifacts
      - name: Publish Test Report
        continue-on-error: true
        env:
          NODE_OPTIONS: "--max_old_space_size=8192"
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
         check_name: ${{ inputs.artifact_suffix }}-jdk${{ matrix.jdk }} Report
         comment: false
         annotate_only: true
         flaky_summary: true
         commit: ${{github.event.workflow_run.head_sha}}
         detailed_summary: true
         report_paths: '**/build/test-results/test/TEST-*.xml'
      - name: Upload Build Artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.artifact_suffix }}-jdk${{ matrix.jdk }}
          path: ${{ inputs.artifact_suffix }}-jdk${{ matrix.jdk }}-logs.tar.gz
          retention-days: 30
